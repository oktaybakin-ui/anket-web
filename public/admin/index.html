<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b6e99" />
    <title>Admin Panel · TReTREAT</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon-192.png" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <img src="/assets/tretreat-logo.png" alt="TReTREAT" style="height:36px;width:auto" />
        <h1>Admin Panel</h1>
      </div>
      <div class="admin-actions">
        <span id="countBadge">0 kayıt</span>
        <input id="searchInput" type="text" placeholder="Ara: ad, soyad veya TC" />
        <a class="btn btn-primary btn-sm" href="/admin/api/export/all">Tümünü Excel'e Aktar</a>
        <button id="logoutBtn" class="btn btn-secondary btn-sm">Çıkış</button>
      </div>
    </div>

    <main style="padding: 0 16px 40px">
      <div class="table-wrap">
        <table id="responsesTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Ad</th>
              <th>Soyad</th>
              <th>TC (maskeli)</th>
              <th>Tarih</th>
              <th style="width: 260px">İşlemler</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>

    <div id="modalRoot"></div>

    <script src="/admin/admin.js"></script>
  </body>
</html>
